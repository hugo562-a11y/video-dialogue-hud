name: Bug Report
description: Report a reproducible bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: App version / commit
      description: Run `git log -1 --oneline` and paste the output here.
      placeholder: "e.g. 2252fc0 初始發布"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.9"
    validations:
      required: true

  - type: input
    id: pytorch
    attributes:
      label: PyTorch version and CUDA build
      description: Run `python -c "import torch; print(torch.__version__)"`.
      placeholder: "e.g. 2.4.0+cu121  /  CPU only"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Load a video …
        3. Click "Scan" …
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Full error traceback
      description: Paste the complete traceback or crash log here.
      render: text
