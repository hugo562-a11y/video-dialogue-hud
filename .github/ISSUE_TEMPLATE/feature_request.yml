name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to share your idea!
        Describe the problem you are trying to solve — that helps us understand the request in context.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that is currently difficult or impossible?
      placeholder: "I often need to … but the app currently …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you have already tried?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, or links to related projects that illustrate the idea.
